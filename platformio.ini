; PlatformIO Project Configuration File
; SBUS HID Gamepad Bridge — two targets:
;   esp32-c3-devkitm-1   : BLE gamepad  (Tenstar ESP32-C3 Super Mini)
;   esp32-s3-supermini   : USB HID gamepad (Tenstar ESP32-S3 Super Mini)

; ---- Shared settings ----
[common]
lib_sbus    = C:\Users\snyder\Documents\Arduino\libraries\Bolder_Flight_Systems_SBUS
lib_pixel   = C:\Users\snyder\Documents\Arduino\libraries\Adafruit_NeoPixel

; ---- C3 — BLE ----
[env:esp32-c3-devkitm-1]
platform        = espressif32
board           = esp32-c3-devkitm-1
framework       = arduino
monitor_speed   = 115200
build_src_filter= +<main.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${common.lib_sbus}
    ${common.lib_pixel}
    lemmingdev/ESP32-BLE-Gamepad

; ---- S3 — USB HID ----
[env:esp32-s3-supermini]
platform        = espressif32
board           = esp32-s3-devkitm-1
framework       = arduino
monitor_speed   = 115200
build_src_filter= +<main_usb.cpp>
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${common.lib_sbus}
    ${common.lib_pixel}
