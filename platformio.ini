; PlatformIO Project Configuration File
; SBUS -> USB HID Gamepad Bridge
; Target: ESP32-C3 Super Mini (Tenstar Robot)

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=0        ; TinyUSB (enables HID + CDC composite)
    -DARDUINO_USB_CDC_ON_BOOT=1 ; keep USB serial for diagnostics
lib_deps =
    C:\Users\snyder\Documents\Arduino\libraries\Bolder_Flight_Systems_SBUS
    C:\Users\snyder\Documents\Arduino\libraries\Adafruit_NeoPixel
